name: Deploy StudyHub to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🧾 Verificar arquivos do projeto
        run: |
          echo "Estrutura do projeto:"
          ls -la

      - name: ✅ Validar arquivos obrigatórios
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html não encontrado"
            exit 1
          fi

          if [ ! -f style.css ]; then
            echo "❌ style.css não encontrado"
            exit 1
          fi

          if [ ! -f script.js ]; then
            echo "❌ script.js não encontrado"
            exit 1
          fi

          echo "✅ Todos os arquivos encontrados"

      - name: 🔍 Mostrar conteúdo principal
        run: |
          echo "Arquivos detectados:"
          find . -maxdepth 2 -type f

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🚀 Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
