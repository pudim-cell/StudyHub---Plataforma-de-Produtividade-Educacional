# Workflow completo e funcional para deploy de conteúdo estático no GitHub Pages
name: Deploy Completo - Static Content to Pages

on:
  # Executa em pushes para a branch principal
  push:
    branches: ["main"]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/static.yml'

  # Executa em PRs para validar antes de merge
  pull_request:
    branches: ["main"]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - 'package.json'

  # Permite execução manual do workflow
  workflow_dispatch:

# Permissões do GITHUB_TOKEN para deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

# Apenas um deployment simultâneo
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  CACHE_VERSION: v1

jobs:
  # Job de linting e validação
  lint:
    runs-on: ubuntu-latest
    name: 🔍 Lint & Validate
    outputs:
      lint-status: ${{ job.status }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache de dependências npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-npm-

      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit

      - name: Executar ESLint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Validar HTML
        run: |
          npm install -g html-validate
          html-validate "**/*.html" --config-file .htmlvalidate.json 2>&1 || echo "HTML validation completed with warnings"
        continue-on-error: true

      - name: Validar CSS
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "**/*.css" --max-warnings 10 2>&1 || echo "CSS validation completed with warnings"
        continue-on-error: true

      - name: Validar formatação de código
        run: npm run format:check --if-present
        continue-on-error: true

  # Job de testes unitários e integração
  test:
    runs-on: ubuntu-latest
    name: 🧪 Testes
    needs: lint
    outputs:
      test-status: ${{ job.status }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache de dependências npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-npm-

      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit

      - name: Executar testes
        run: npm test --if-present -- --coverage
        continue-on-error: true

      - name: Upload resultados de cobertura
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload artefato de cobertura
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

      - name: Comentar resultados no PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;
              const comment = `## 📊 Relatório de Cobertura de Testes\n\n| Métrica | Porcentagem |\n|--------|-------------|\n| Linhas | ${total.lines.pct}% |\n| Statements | ${total.statements.pct}% |\n| Funções | ${total.functions.pct}% |\n| Branches | ${total.branches.pct}% |`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # Job de build
  build:
    runs-on: ubuntu-latest
    name: 🔨 Build
    needs: test
    if: always()
    outputs:
      build-status: ${{ job.status }}
      build-time: ${{ steps.build-time.outputs.duration }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache de dependências npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-npm-

      - name: Cache de build anterior
        uses: actions/cache@v3
        with:
          path: dist/
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit

      - name: Medir tempo de build
        id: build-time
        run: echo "duration=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build projeto
        run: npm run build --if-present
        env:
          CI: true
          VITE_APP_VERSION: ${{ github.ref_name }}-${{ github.sha }}

      - name: Calcular duração do build
        run: |
          START_TIME=$(echo "${{ steps.build-time.outputs.duration }}" | cut -d' ' -f1)
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Build concluído em ${DURATION}s"

      - name: Validar saída de build
        run: |
          if [ -d "dist" ]; then
            echo "✅ Diretório dist encontrado"
            du -sh dist/
            find dist/ -type f -name "*.js" -o -name "*.css" -o -name "*.html" | wc -l
          else
            echo "❌ Erro: Diretório dist não encontrado"
            exit 1
          fi

      - name: Gerar relatório de assets
        run: |
          echo "## 📦 Relatório de Assets" > build-report.md
          echo "" >> build-report.md
          echo "### Arquivos gerados" >> build-report.md
          echo '```' >> build-report.md
          find dist/ -type f | head -20 >> build-report.md
          echo '```' >> build-report.md
          echo "" >> build-report.md
          echo "### Tamanho total" >> build-report.md
          du -sh dist/ >> build-report.md

      - name: Upload artefato de build
        uses: actions/upload-artifact@v3
        with:
          name: build-artifact
          path: dist/
          retention-days: 5
          if-no-files-found: error

      - name: Upload relatório de build
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-report
          path: build-report.md
          retention-days: 3

  # Job de análise de qualidade
  quality:
    runs-on: ubuntu-latest
    name: 📊 Análise de Qualidade
    needs: lint
    if: always()
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache de dependências npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-npm-

      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit

      - name: Análise com SonarQube (opcional)
        run: npm run sonar --if-present
        continue-on-error: true

      - name: Verificar dependências desatualizadas
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Relatório de dependências
        run: |
          echo "## 📋 Status das Dependências" > deps-report.md
          npm list --depth=0 >> deps-report.md || true

      - name: Upload relatório de dependências
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependencies-report
          path: deps-report.md
          retention-days: 7

  # Job de security checks
  security:
    runs-on: ubuntu-latest
    name: 🔐 Security Checks
    needs: lint
    if: always()
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar Trivy scanning
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Verificar dependências vulneráveis
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high || true
        continue-on-error: true

  # Job de deploy (apenas para push na main)
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: 🚀 Deploy para GitHub Pages
    needs: [build, quality, security]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download artefato de build
        uses: actions/download-artifact@v3
        with:
          name: build-artifact
          path: dist/

      - name: Verificar integridade dos arquivos
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "❌ Erro: Diretório dist está vazio"
            exit 1
          fi
          echo "✅ Arquivos prontos para deploy"
          ls -la dist/

      - name: Upload artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: 🎉 Deploy concluído com sucesso
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "📄 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🕐 Data/Hora: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📝 Commit: ${{ github.sha }}"

      - name: Notificar no PR (se aplicável)
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Deploy Preview disponível em:** ${{ steps.deployment.outputs.page_url }}`
            });

  # Job final de notificação
  notify:
    runs-on: ubuntu-latest
    name: 📬 Notificações
    if: always()
    needs: [lint, test, build, deploy, quality, security]
    steps:
      - name: Verificar status geral
        run: |
          echo "📊 Status do Workflow:"
          echo "  Lint: ${{ needs.lint.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Build: ${{ needs.build.result }}"
          echo "  Deploy: ${{ needs.deploy.result }}"
          echo "  Quality: ${{ needs.quality.result }}"
          echo "  Security: ${{ needs.security.result }}"

      - name: Criar badge de status
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ Build bem-sucedido"
          else
            echo "❌ Build falhou"
            exit 1
          fi
        continue-on-error: true

      - name: Notificar Slack (opcional)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "StudyHub Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\n• Lint: ${{ needs.lint.result }}\n• Tests: ${{ needs.test.result }}\n• Build: ${{ needs.build.result }}\n• Deploy: ${{ needs.deploy.result }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
